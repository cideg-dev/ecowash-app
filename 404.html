<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page introuvable | EcoWash</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page { text-align: center; padding: 80px 20px; }
        .error-page h1 { font-size: 5rem; color: var(--primary); margin-bottom: 10px; }
        .error-page h2 { font-size: 1.5rem; color: #333; margin-bottom: 20px; }
        .error-page p { color: var(--gray); margin-bottom: 30px; }
        .error-page .btn { display: inline-block; }
    </style>
</head>
<body>
    <div class="container error-page">
        <h1>404</h1>
        <h2>Page introuvable</h2>
        <p>Désolé, la page que vous cherchez n'existe pas ou a été déplacée.</p>
        <a href="index.html" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
