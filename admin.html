<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWash - Administration</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .login-box h1 { text-align: center; font-size: 1.5rem; margin-bottom: 30px; }
        .login-error { color: #e74c3c; font-size: .9rem; text-align: center; margin-top: 10px; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-header h1 { font-size: 1.5rem; margin: 0; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: var(--light);
            cursor: pointer;
            font-weight: 500;
            transition: background .3s;
        }
        .tab.active { background: var(--primary); color: white; }
        .tab-count {
            background: var(--primary-dark);
            color: white;
            font-size: .7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .tab.active .tab-count { background: rgba(255,255,255,.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .msg-card {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }
        .msg-card h3 { margin-bottom: 5px; }
        .msg-card .meta { font-size: .85rem; color: var(--gray); margin-bottom: 10px; }
        .msg-card .meta span { margin-right: 15px; }
        .msg-card p { color: #333; }
        .empty-msg { text-align: center; color: var(--gray); padding: 40px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--primary-dark); }
        .stat-card .label { color: var(--gray); font-size: .9rem; }
        .bk-status {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: .8rem;
            font-weight: 600;
        }
        .bk-status.confirmed { background: #d4edda; color: #155724; }
        .bk-status.pending { background: #fff3cd; color: #856404; }
        .bk-status.done { background: #cce5ff; color: #004085; }
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container" id="login-screen">
        <div class="login-box">
            <h1>Administration EcoWash</h1>
            <div class="form-group">
                <label for="admin-pwd">Mot de passe</label>
                <input type="password" id="admin-pwd" placeholder="Entrez le mot de passe">
            </div>
            <button onclick="login()" class="btn btn-block">Connexion</button>
            <div id="login-error" class="login-error hidden">Mot de passe incorrect</div>
        </div>
    </div>

    <div class="container hidden" id="admin-screen">
        <div class="admin-header">
            <h1>Tableau de bord EcoWash</h1>
            <button onclick="logout()" class="logout-btn">Déconnexion</button>
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('messages',this)">
                Messages <span class="tab-count" id="msg-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('bookings',this)">
                Rendez-vous <span class="tab-count" id="bk-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('reviews',this)">
                Avis <span class="tab-count" id="rv-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('calendar',this)">
                Calendrier
            </button>
            <button class="tab" onclick="switchTab('export',this)">
                Export
            </button>
        </div>

        <div class="tab-content active" id="tab-messages"></div>
        <div class="tab-content" id="tab-bookings"></div>
        <div class="tab-content" id="tab-reviews"></div>
        <div class="tab-content" id="tab-calendar">
            <div class="cal-header" id="cal-header"></div>
            <div class="admin-calendar" id="cal-grid"></div>
            <div id="cal-events" style="margin-top:15px;font-size:.9rem;color:var(--gray)"></div>
        </div>
        <div class="tab-content" id="tab-export">
            <div style="max-width:400px;margin:0 auto;text-align:center">
                <p style="margin-bottom:20px;color:var(--gray)">Téléchargez vos données au format CSV</p>
                <button class="btn" onclick="exportCSV('messages')" style="margin:5px">Messages</button>
                <button class="btn" onclick="exportCSV('bookings')" style="margin:5px">Rendez-vous</button>
                <button class="btn" onclick="exportCSV('reviews')" style="margin:5px">Avis clients</button>
                <button class="btn btn-outline" onclick="exportAll()" style="margin:5px;display:block;width:100%;margin-top:15px">Tout exporter</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        var loggedIn = false;

        function login() {
            var pwd = document.getElementById('admin-pwd').value;
            if (pwd === CONFIG.admin.password) {
                loggedIn = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            loggedIn = false;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('admin-screen').classList.add('hidden');
            document.getElementById('admin-pwd').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function loadData() {
            var messages = JSON.parse(localStorage.getItem('ecowash_messages') || '[]');
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var reviews = JSON.parse(localStorage.getItem('ecowash_reviews') || '[]');

            document.getElementById('msg-count').textContent = messages.length;
            document.getElementById('bk-count').textContent = bookings.length;
            document.getElementById('rv-count').textContent = reviews.length;

            document.getElementById('stats').innerHTML =
                '<div class="stat-card"><div class="num">' + messages.length + '</div><div class="label">Messages</div></div>' +
                '<div class="stat-card"><div class="num">' + bookings.length + '</div><div class="label">Rendez-vous</div></div>' +
                '<div class="stat-card"><div class="num">' + reviews.length + '</div><div class="label">Avis clients</div></div>' +
                '<div class="stat-card"><div class="num">' + (bookings.length + messages.length) + '</div><div class="label">Total interactions</div></div>';

            renderMessages(messages);
            renderBookings(bookings);
            renderReviews(reviews);
        }

        function renderMessages(list) {
            var el = document.getElementById('tab-messages');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun message pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var m = list[i];
                html += '<div class="msg-card"><h3>' + esc(m.name) + '</h3>' +
                    '<div class="meta"><span>&#9993; ' + esc(m.email) + '</span>' +
                    (m.phone ? '<span>&#9742; ' + esc(m.phone) + '</span>' : '') +
                    '<span>Sujet: ' + esc(m.subject) + '</span>' +
                    '<span>' + new Date(m.date).toLocaleString('fr-FR') + '</span></div>' +
                    '<p>' + esc(m.message) + '</p></div>';
            }
            el.innerHTML = html;
        }

        function renderBookings(list) {
            var el = document.getElementById('tab-bookings');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun rendez-vous pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var b = list[i];
                var serviceNames = { simple: 'Lavage Simple', complet: 'Lavage Complet', premium: 'Lavage Premium' };
                html += '<div class="msg-card"><h3>' + esc(b.name) + ' <span class="bk-status confirmed">Confirmé</span></h3>' +
                    '<div class="meta"><span>&#9742; ' + esc(b.phone) + '</span>' +
                    '<span>&#128205; ' + esc(b.address) + '</span></div>' +
                    '<div class="meta"><span>&#128663; ' + esc(b.vehicle) + '</span>' +
                    '<span>&#128737; ' + (serviceNames[b.service] || b.service) + '</span></div>' +
                    '<div class="meta"><span>&#128197; ' + b.date + ' à ' + b.time + '</span>' +
                    '<span>&#128176; ' + esc(b.payment) + '</span></div>' +
                    (b.notes ? '<p>Note: ' + esc(b.notes) + '</p>' : '') +
                    '</div>';
            }
            el.innerHTML = html;
        }

        function renderReviews(list) {
            var el = document.getElementById('tab-reviews');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun avis pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var r = list[i];
                var stars = '';
                for (var j = 0; j < parseInt(r.rating); j++) stars += '\u2605';
                html += '<div class="msg-card"><div class="stars" style="color:#f1c40f">' + stars + '</div>' +
                    '<p>"' + esc(r.message) + '"</p>' +
                    '<div class="meta">- ' + esc(r.name) + ' &middot; ' + new Date(r.date).toLocaleString('fr-FR') + '</div></div>';
            }
            el.innerHTML = html;
        }

        function renderCalendar() {
            var grid = document.getElementById('cal-grid');
            var header = document.getElementById('cal-header');
            var events = document.getElementById('cal-events');
            if (!grid) return;

            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var now = new Date();
            var y = now.getFullYear();
            var m = now.getMonth();
            var daysInMonth = new Date(y, m + 1, 0).getDate();
            var firstDay = new Date(y, m, 1).getDay();

            var months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
            header.textContent = months[m] + ' ' + y;

            var html = '';
            ['Di','Lu','Ma','Me','Je','Ve','Sa'].forEach(function (d) { html += '<div class="cal-day" style="font-weight:600">' + d + '</div>'; });

            for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

            for (var day = 1; day <= daysInMonth; day++) {
                var dateStr = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                var dayBookings = bookings.filter(function (b) { return b.date === dateStr; });
                var cls = 'cal-day';
                if (day === now.getDate() && m === now.getMonth() && y === now.getFullYear()) cls += ' today';
                if (dayBookings.length > 0) cls += ' has-event';
                html += '<div class="' + cls + '" onclick="showDayEvents(\'' + dateStr + '\')">' + day + '</div>';
            }
            grid.innerHTML = html;
            events.innerHTML = 'Cliquez sur un jour avec rendez-vous pour voir les détails.';
        }

        function showDayEvents(dateStr) {
            var events = document.getElementById('cal-events');
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var dayBks = bookings.filter(function (b) { return b.date === dateStr; });
            if (dayBks.length === 0) { events.innerHTML = 'Aucun rendez-vous ce jour.'; return; }
            var html = '<strong>' + dayBks.length + ' rendez-vous le ' + dateStr + '</strong><br><br>';
            dayBks.forEach(function (b) {
                html += '<div style="background:var(--white);padding:10px;border-radius:6px;margin-bottom:8px;border-left:3px solid var(--primary)">' +
                    '<strong>' + esc(b.name) + '</strong> à ' + b.time + '<br>' +
                    b.vehicle + ' - ' + b.service + '<br>' +
                    esc(b.address) + ' - ' + b.payment + '</div>';
            });
            events.innerHTML = html;
        }

        function exportCSV(type) {
            var data = JSON.parse(localStorage.getItem('ecowash_' + type) || '[]');
            if (data.length === 0) { alert('Aucune donnée à exporter.'); return; }
            var headers = Object.keys(data[0]);
            var csv = headers.join(',') + '\n';
            data.forEach(function (row) {
                csv += headers.map(function (h) {
                    var val = (row[h] || '').toString();
                    if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1) val = '"' + val.replace(/"/g, '""') + '"';
                    return val;
                }).join(',') + '\n';
            });
            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'ecowash_' + type + '_' + new Date().toISOString().split('T')[0] + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function exportAll() {
            exportCSV('messages');
            setTimeout(function () { exportCSV('bookings'); }, 300);
            setTimeout(function () { exportCSV('reviews'); }, 600);
        }

        function switchTab(name, btn) {
            document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(function (t) { t.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'calendar') renderCalendar();
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        if (typeof CONFIG !== 'undefined' && CONFIG.admin.password) {
            document.getElementById('admin-pwd').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') login();
            });
        }
    </script>
</body>
</html>
