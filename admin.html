<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWash - Administration</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .login-box h1 { text-align: center; font-size: 1.5rem; margin-bottom: 30px; }
        .login-error { color: #e74c3c; font-size: .9rem; text-align: center; margin-top: 10px; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-header h1 { font-size: 1.5rem; margin: 0; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: var(--light);
            cursor: pointer;
            font-weight: 500;
            transition: background .3s;
        }
        .tab.active { background: var(--primary); color: white; }
        .tab-count {
            background: var(--primary-dark);
            color: white;
            font-size: .7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .tab.active .tab-count { background: rgba(255,255,255,.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .msg-card {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }
        .msg-card h3 { margin-bottom: 5px; }
        .msg-card .meta { font-size: .85rem; color: var(--gray); margin-bottom: 10px; }
        .msg-card .meta span { margin-right: 15px; }
        .msg-card p { color: #333; }
        .empty-msg { text-align: center; color: var(--gray); padding: 40px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--primary-dark); }
        .stat-card .label { color: var(--gray); font-size: .9rem; }
        .chart-wrap { background: var(--white); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .chart-wrap canvas { width: 100% !important; height: auto !important; max-height: 250px; }
        .bk-status {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: .8rem;
            font-weight: 600;
        }
        .bk-status.confirmed { background: #d4edda; color: #155724; }
        .bk-status.pending { background: #fff3cd; color: #856404; }
        .bk-status.done { background: #cce5ff; color: #004085; }
        .bk-status.en_cours { background: #cce5ff; color: #004085; }
        .bk-status.terminé { background: #d4edda; color: #155724; }
        .bk-status.annulé { background: #f8d7da; color: #721c24; }
        .bk-status-btn { border: 1px solid #ddd; background: var(--white); border-radius: 6px; padding: 4px 12px; font-size: .78rem; cursor: pointer; color: var(--text); }
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container" id="login-screen">
        <div class="login-box">
            <h1>Administration EcoWash</h1>
            <div class="form-group">
                <label for="admin-pwd">Mot de passe</label>
                <input type="password" id="admin-pwd" placeholder="Entrez le mot de passe">
            </div>
            <button onclick="login()" class="btn btn-block">Connexion</button>
            <div id="login-error" class="login-error hidden">Mot de passe incorrect</div>
        </div>
    </div>

    <div class="container hidden" id="admin-screen">
        <div class="admin-header">
            <h1>Tableau de bord EcoWash</h1>
            <button onclick="logout()" class="logout-btn">Déconnexion</button>
        </div>

        <div class="stats-grid" id="stats"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('messages',this)">
                Messages <span class="tab-count" id="msg-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('bookings',this)">
                Rendez-vous <span class="tab-count" id="bk-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('reviews',this)">
                Avis <span class="tab-count" id="rv-count">0</span>
            </button>
            <button class="tab" onclick="switchTab('calendar',this)">
                Calendrier
            </button>
            <button class="tab" onclick="switchTab('analytics',this)">
                Analytics
            </button>
            <button class="tab" onclick="switchTab('customers',this)">
                Clients
            </button>
            <button class="tab" onclick="switchTab('export',this)">
                Export
            </button>
            <button class="tab" onclick="switchTab('provider',this)" style="background:#8e44ad;color:white">
                🧽 Prestataire
            </button>
        </div>

        <div class="tab-content active" id="tab-messages"></div>
        <div class="tab-content" id="tab-bookings"></div>
        <div class="tab-content" id="tab-reviews"></div>
        <div class="tab-content" id="tab-calendar">
            <div class="cal-header" id="cal-header"></div>
            <div class="admin-calendar" id="cal-grid"></div>
            <div id="cal-events" style="margin-top:15px;font-size:.9rem;color:var(--gray)"></div>
        </div>
        <div class="tab-content" id="tab-analytics">
            <div class="chart-wrap">
                <h3 style="margin-bottom:15px">Rendez-vous par jour (ce mois)</h3>
                <canvas id="chart-canvas" height="250"></canvas>
            </div>
            <div class="chart-wrap">
                <h3 style="margin-bottom:15px">Répartition des services</h3>
                <div id="service-pie" style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center"></div>
            </div>
        </div>
        <div class="tab-content" id="tab-customers">
            <div style="margin-bottom:15px">
                <input type="text" id="customer-search" placeholder="Rechercher un client..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:.95rem">
            </div>
            <div id="customer-list"></div>
        </div>
        <div class="tab-content" id="tab-export">
            <div style="max-width:400px;margin:0 auto;text-align:center">
                <p style="margin-bottom:20px;color:var(--gray)">Téléchargez vos données au format CSV</p>
                <button class="btn" onclick="exportCSV('messages')" style="margin:5px">Messages</button>
                <button class="btn" onclick="exportCSV('bookings')" style="margin:5px">Rendez-vous</button>
                <button class="btn" onclick="exportCSV('reviews')" style="margin:5px">Avis clients</button>
                <button class="btn btn-outline" onclick="exportAll()" style="margin:5px;display:block;width:100%;margin-top:15px">Tout exporter</button>
            </div>
        </div>
        <div class="tab-content" id="tab-provider">
            <div id="provider-today" style="margin-bottom:15px">
                <h3 style="display:flex;align-items:center;gap:8px">🧽 <span>Mes interventions du jour</span></h3>
                <p style="color:var(--gray);font-size:.9rem" id="provider-date"></p>
            </div>
            <div id="provider-list"></div>
            <div style="margin-top:30px">
                <h3 style="margin-bottom:15px">📊 Mon résumé</h3>
                <div class="stats-grid" id="provider-stats"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        var loggedIn = false;

        function login() {
            var pwd = document.getElementById('admin-pwd').value;
            if (pwd === CONFIG.admin.password) {
                loggedIn = true;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            loggedIn = false;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('admin-screen').classList.add('hidden');
            document.getElementById('admin-pwd').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function loadData() {
            autoFillPromos();
            var messages = JSON.parse(localStorage.getItem('ecowash_messages') || '[]');
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var reviews = JSON.parse(localStorage.getItem('ecowash_reviews') || '[]');

            document.getElementById('msg-count').textContent = messages.length;
            document.getElementById('bk-count').textContent = bookings.length;
            document.getElementById('rv-count').textContent = reviews.length;

            document.getElementById('stats').innerHTML =
                '<div class="stat-card"><div class="num">' + messages.length + '</div><div class="label">Messages</div></div>' +
                '<div class="stat-card"><div class="num">' + bookings.length + '</div><div class="label">Rendez-vous</div></div>' +
                '<div class="stat-card"><div class="num">' + reviews.length + '</div><div class="label">Avis clients</div></div>' +
                '<div class="stat-card"><div class="num">' + (bookings.length + messages.length) + '</div><div class="label">Total interactions</div></div>';

            renderMessages(messages);
            renderBookings(bookings);
            renderReviews(reviews);
            if (typeof initAdminMessageMgmt === 'function') initAdminMessageMgmt();
            if (typeof initAdminWhatsAppReply === 'function') { initAdminWhatsAppReply(); renderMessages(messages); }

        function renderMessages(list) {
            var el = document.getElementById('tab-messages');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun message pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var m = list[i];
                html += '<div class="msg-card"><h3>' + esc(m.name) + '</h3>' +
                    '<div class="meta"><span>&#9993; ' + esc(m.email) + '</span>' +
                    (m.phone ? '<span>&#9742; ' + esc(m.phone) + '</span>' : '') +
                    '<span>Sujet: ' + esc(m.subject) + '</span>' +
                    '<span>' + new Date(m.date).toLocaleString('fr-FR') + '</span></div>' +
                    '<p>' + esc(m.message) + '</p>' +
                    '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">' +
                    '<button class="bk-status-btn" style="background:#e74c3c;color:white;border:none" onclick="deleteItem(\'messages\',' + i + ')">🗑 Supprimer</button></div></div>';
            }
            el.innerHTML = html;
        }

        function renderBookings(list) {
            var el = document.getElementById('tab-bookings');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun rendez-vous pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var b = list[i];
                var statuses = ['confirmé', 'en_cours', 'terminé', 'annulé'];
                var statusLabels = { confirmé: 'Confirmé', en_cours: 'En cours', terminé: 'Terminé', annulé: 'Annulé' };
                var currentStatus = b.status || 'confirmé';
                var serviceNames = { simple: 'Lavage Simple', complet: 'Lavage Complet', premium: 'Lavage Premium' };
                html += '<div class="msg-card"><h3>' + esc(b.name) + ' <span class="bk-status ' + currentStatus + '">' + (statusLabels[currentStatus] || 'Confirmé') + '</span></h3>' +
                    '<div class="meta"><span>&#9742; ' + esc(b.phone) + '</span>' +
                    '<span>&#128205; ' + esc(b.address) + '</span></div>' +
                    '<div class="meta"><span>&#128663; ' + esc(b.vehicle) + '</span>' +
                    '<span>&#128737; ' + (serviceNames[b.service] || b.service) + '</span></div>' +
                    '<div class="meta" id="bk-meta-' + i + '"><span>&#128197; ' + b.date + ' à ' + b.time + '</span>' +
                    '<span>&#128176; ' + esc(b.payment) + '</span></div>' +
                    (b.notes ? '<p>Note: ' + esc(b.notes) + '</p>' : '') +
                    (b.frequency && b.frequency !== 'une_fois' ? '<p style="font-size:.8rem;color:var(--gray)">&#128260; Récurrent: ' + b.frequency.replace('_',' ') + '</p>' : '') +
                    '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">' +
                    statuses.map(function (s) {
                        var act = s === currentStatus ? ' style="background:var(--primary);color:white;border-color:var(--primary)"' : '';
                        return '<button class="bk-status-btn" data-idx="' + i + '" data-status="' + s + '"' + act + '>' + (statusLabels[s] || s) + '</button>';
                    }).join('') +
                    '<button class="bk-status-btn" onclick="editBooking(' + i + ')" style="background:#3498db;color:white;border:none">✏️ Modifier</button>' +
                    '<button class="bk-status-btn" onclick="deleteItem(\'bookings\',' + i + ')" style="background:#e74c3c;color:white;border:none">🗑 Supprimer</button>' +
                    '</div>' +
                    '<div style="margin-top:8px;font-size:.8rem">' +
                    '<label>Prestataire: <select class="provider-select" data-idx="' + i + '" style="padding:4px;border:1px solid var(--border);border-radius:4px;font-size:.8rem">' +
                    '<option value="">Non assigné</option>' +
                    (typeof CONFIG !== 'undefined' && CONFIG.providers ? CONFIG.providers.filter(function(p){return p.active}).map(function(p){
                        var sel = b.provider === p.name ? ' selected' : '';
                        return '<option value="' + p.name + '"' + sel + '>' + p.name + '</option>';
                    }).join('') : '') +
                    '</select></label></div></div>';
            }
            el.innerHTML = html;

            el.querySelectorAll('.bk-status-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var idx = parseInt(this.getAttribute('data-idx'));
                    var newStatus = this.getAttribute('data-status');
                    var allBookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
                    allBookings[allBookings.length - 1 - idx].status = newStatus;
                    localStorage.setItem('ecowash_bookings', JSON.stringify(allBookings));
                    renderBookings(JSON.parse(localStorage.getItem('ecowash_bookings') || '[]'));
                });
            });
            el.querySelectorAll('.provider-select').forEach(function (sel) {
                sel.addEventListener('change', function () {
                    var idx = parseInt(this.getAttribute('data-idx'));
                    var allBookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
                    allBookings[allBookings.length - 1 - idx].provider = this.value;
                    localStorage.setItem('ecowash_bookings', JSON.stringify(allBookings));
                    if (typeof showToast === 'function') showToast('Prestataire mis à jour', 'success');
                });
            });
        }

        function renderReviews(list) {
            var el = document.getElementById('tab-reviews');
            if (list.length === 0) {
                el.innerHTML = '<div class="empty-msg">Aucun avis pour le moment.</div>';
                return;
            }
            var html = '';
            for (var i = list.length - 1; i >= 0; i--) {
                var r = list[i];
                var stars = '';
                for (var j = 0; j < parseInt(r.rating); j++) stars += '\u2605';
                html += '<div class="msg-card"><div class="stars" style="color:#f1c40f">' + stars + '</div>' +
                    '<p>"' + esc(r.message) + '"</p>' +
                    '<div class="meta">- ' + esc(r.name) + ' &middot; ' + new Date(r.date).toLocaleString('fr-FR') + '</div>' +
                    '<div style="margin-top:8px"><button class="bk-status-btn" style="background:#e74c3c;color:white;border:none" onclick="deleteItem(\'reviews\',' + i + ')">🗑 Supprimer</button></div></div>';
            }
            el.innerHTML = html;
        }
    }

    function renderCalendar() {
            var grid = document.getElementById('cal-grid');
            var header = document.getElementById('cal-header');
            var events = document.getElementById('cal-events');
            if (!grid) return;

            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var now = new Date();
            var y = now.getFullYear();
            var m = now.getMonth();
            var daysInMonth = new Date(y, m + 1, 0).getDate();
            var firstDay = new Date(y, m, 1).getDay();

            var months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
            header.textContent = months[m] + ' ' + y;

            var html = '';
            ['Di','Lu','Ma','Me','Je','Ve','Sa'].forEach(function (d) { html += '<div class="cal-day" style="font-weight:600">' + d + '</div>'; });

            for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

            for (var day = 1; day <= daysInMonth; day++) {
                var dateStr = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                var dayBookings = bookings.filter(function (b) { return b.date === dateStr; });
                var cls = 'cal-day';
                if (day === now.getDate() && m === now.getMonth() && y === now.getFullYear()) cls += ' today';
                if (dayBookings.length > 0) cls += ' has-event';
                html += '<div class="' + cls + '" onclick="showDayEvents(\'' + dateStr + '\')">' + day + '</div>';
            }
            grid.innerHTML = html;
            events.innerHTML = 'Cliquez sur un jour avec rendez-vous pour voir les détails.';
        }

        function showDayEvents(dateStr) {
            var events = document.getElementById('cal-events');
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var dayBks = bookings.filter(function (b) { return b.date === dateStr; });
            if (dayBks.length === 0) { events.innerHTML = 'Aucun rendez-vous ce jour.'; return; }
            var html = '<strong>' + dayBks.length + ' rendez-vous le ' + dateStr + '</strong><br><br>';
            dayBks.forEach(function (b) {
                html += '<div style="background:var(--white);padding:10px;border-radius:6px;margin-bottom:8px;border-left:3px solid var(--primary)">' +
                    '<strong>' + esc(b.name) + '</strong> à ' + b.time + '<br>' +
                    b.vehicle + ' - ' + b.service + '<br>' +
                    esc(b.address) + ' - ' + b.payment + '</div>';
            });
            events.innerHTML = html;
        }

        function exportCSV(type) {
            var data = JSON.parse(localStorage.getItem('ecowash_' + type) || '[]');
            if (data.length === 0) { alert('Aucune donnée à exporter.'); return; }
            var headers = Object.keys(data[0]);
            var csv = headers.join(',') + '\n';
            data.forEach(function (row) {
                csv += headers.map(function (h) {
                    var val = (row[h] || '').toString();
                    if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1) val = '"' + val.replace(/"/g, '""') + '"';
                    return val;
                }).join(',') + '\n';
            });
            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'ecowash_' + type + '_' + new Date().toISOString().split('T')[0] + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function exportAll() {
            exportCSV('messages');
            setTimeout(function () { exportCSV('bookings'); }, 300);
            setTimeout(function () { exportCSV('reviews'); }, 600);
        }

        function switchTab(name, btn) {
            document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(function (t) { t.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'calendar') renderCalendar();
            if (name === 'analytics') renderAnalytics();
            if (name === 'customers') renderCustomers();
            if (name === 'provider') renderProviderDashboard();
        }

        function renderAnalytics() {
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var canvas = document.getElementById('chart-canvas');
            if (!canvas) return;

            var now = new Date();
            var y = now.getFullYear();
            var m = now.getMonth();
            var daysInMonth = new Date(y, m + 1, 0).getDate();

            var dayCounts = [];
            for (var d = 1; d <= daysInMonth; d++) {
                var ds = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                dayCounts.push(bookings.filter(function (b) { return b.date === ds; }).length);
            }

            var ctx = canvas.getContext('2d');
            var W = canvas.width = canvas.parentElement.offsetWidth || 600;
            var H = canvas.height = 250;
            var pad = { t: 20, r: 15, b: 30, l: 40 };
            var chartW = W - pad.l - pad.r;
            var chartH = H - pad.t - pad.b;
            var maxVal = Math.max(1, Math.max.apply(null, dayCounts));
            var barW = chartW / daysInMonth * 0.7;
            var gap = chartW / daysInMonth * 0.3;

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#666';
            ctx.font = '11px system-ui';
            for (var i = 0; i <= 4; i++) {
                var yVal = Math.round((maxVal / 4) * i);
                var yPos = pad.t + chartH - (chartH / 4) * i;
                ctx.fillText(yVal, 5, yPos + 4);
                ctx.strokeStyle = '#eee';
                ctx.beginPath();
                ctx.moveTo(pad.l - 5, yPos);
                ctx.lineTo(W - pad.r, yPos);
                ctx.stroke();
            }

            for (var d = 0; d < dayCounts.length; d++) {
                var x = pad.l + (chartW / daysInMonth) * d + gap / 2;
                var barH = (dayCounts[d] / maxVal) * chartH;
                ctx.fillStyle = '#2ecc71';
                ctx.roundRect ? ctx.roundRect(x, pad.t + chartH - barH, barW, barH, [3,3,0,0]) : null;
                if (ctx.roundRect) { ctx.fill(); }
                else { ctx.fillRect(x, pad.t + chartH - barH, barW, barH); }
                ctx.fillStyle = '#999';
                ctx.textAlign = 'center';
                ctx.fillText(d + 1, x + barW / 2, H - 8);
            }

            /* Service pie chart */
            var pieEl = document.getElementById('service-pie');
            var svcCounts = {};
            bookings.forEach(function (b) {
                svcCounts[b.service] = (svcCounts[b.service] || 0) + 1;
            });
            var labels = { simple: 'Simple', complet: 'Complet', premium: 'Premium' };
            var colors = { simple: '#2ecc71', complet: '#3498db', premium: '#e67e22' };
            var total = bookings.length || 1;
            var pieHtml = '';
            for (var s in svcCounts) {
                var pct = Math.round((svcCounts[s] / total) * 100);
                pieHtml += '<div style="text-align:center;min-width:100px">' +
                    '<div style="width:60px;height:60px;border-radius:50%;background:' + (colors[s] || '#999') + ';margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:1.1rem">' + pct + '%</div>' +
                    '<div style="font-size:.85rem;color:var(--gray)">' + (labels[s] || s) + ' (' + svcCounts[s] + ')</div></div>';
            }
            pieEl.innerHTML = pieHtml;
        }

        function renderCustomers() {
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var messages = JSON.parse(localStorage.getItem('ecowash_messages') || '[]');

            var customerMap = {};
            bookings.forEach(function (b) {
                var key = (b.phone || b.name).toLowerCase().replace(/\s/g, '');
                if (!customerMap[key]) customerMap[key] = { name: b.name, phone: b.phone || '', bookings: 0, services: [], lastDate: '' };
                customerMap[key].bookings++;
                if (customerMap[key].services.indexOf(b.service) === -1) customerMap[key].services.push(b.service);
                if (b.date > customerMap[key].lastDate) customerMap[key].lastDate = b.date;
            });

            var list = Object.keys(customerMap).map(function (k) { return customerMap[k]; });
            list.sort(function (a, b) { return b.bookings - a.bookings; });

            var searchEl = document.getElementById('customer-search');
            function filterList() {
                var q = (searchEl.value || '').toLowerCase();
                var filtered = list.filter(function (c) { return c.name.toLowerCase().indexOf(q) !== -1 || c.phone.indexOf(q) !== -1; });
                var html = '<div class="empty-msg" ' + (filtered.length ? 'style="display:none"' : '') + '>Aucun client trouvé.</div>';
                filtered.forEach(function (c) {
                    html += '<div class="msg-card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">' +
                        '<div><strong>' + esc(c.name) + '</strong>' + (c.phone ? '<br><span style="font-size:.85rem;color:var(--gray)">' + c.phone + '</span>' : '') + '</div>' +
                        '<div style="text-align:right;font-size:.9rem">' +
                        '<span style="color:var(--primary-dark);font-weight:600">' + c.bookings + '</span> lavage(s)<br>' +
                        '<span style="color:var(--gray);font-size:.8rem">Dernier: ' + c.lastDate + '</span></div></div>';
                });
                document.getElementById('customer-list').innerHTML = html;
            }

            searchEl.addEventListener('input', filterList);
            filterList();
        }

        /* === AUTO-FILL PROMOS DEPUIS RÉSERVATIONS === */
        function autoFillPromos() {
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            if (bookings.length < 3) return;
            var promos = JSON.parse(localStorage.getItem('ecowash_promos') || '[]');
            var existing = promos.map(function (p) { return p.code; });
            var newCodes = [];
            if (existing.indexOf('REGULIER10') === -1) newCodes.push({ code: 'REGULIER10', type: 'percent', value: 10, label: '-10% abonné' });
            if (existing.indexOf('PARRAIN') === -1) newCodes.push({ code: 'PARRAIN', type: 'percent', value: 15, label: '-15% parrainage' });
            if (existing.indexOf('FIDELITE') === -1) newCodes.push({ code: 'FIDELITE', type: 'fixed', value: 500, label: '-500 F' });
            if (bookings.length >= 10 && existing.indexOf('VIP20') === -1) newCodes.push({ code: 'VIP20', type: 'percent', value: 20, label: '-20% VIP' });
            if (newCodes.length) {
                promos = promos.concat(newCodes);
                localStorage.setItem('ecowash_promos', JSON.stringify(promos));
            }
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function deleteItem(type, displayIdx) {
            if (!confirm('Supprimer cet élément ?')) return;
            var key = 'ecowash_' + type;
            var list = JSON.parse(localStorage.getItem(key) || '[]');
            var realIdx = list.length - 1 - displayIdx;
            list.splice(realIdx, 1);
            localStorage.setItem(key, JSON.stringify(list));
            loadData();
            showToast('✅ Élément supprimé', 'success');
        }

        function editBooking(displayIdx) {
            var list = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var realIdx = list.length - 1 - displayIdx;
            var b = list[realIdx];
            var newDate = prompt('Nouvelle date (AAAA-MM-JJ) :', b.date);
            if (!newDate) return;
            var newTime = prompt('Nouvel horaire (HH:MM) :', b.time);
            if (!newTime) return;
            list[realIdx].date = newDate;
            list[realIdx].time = newTime;
            localStorage.setItem('ecowash_bookings', JSON.stringify(list));
            loadData();
            showToast('✅ Rendez-vous modifié', 'success');
        }

        if (typeof CONFIG !== 'undefined' && CONFIG.admin.password) {
            document.getElementById('admin-pwd').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') login();
            });
        }

        /* === MODE PRESTATAIRE === */
        function renderProviderDashboard() {
            var today = new Date().toISOString().split('T')[0];
            document.getElementById('provider-date').textContent = "Aujourd'hui, " + new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var todayBks = bookings.filter(function (b) { return b.date === today; });

            var list = document.getElementById('provider-list');
            if (todayBks.length === 0) {
                list.innerHTML = '<div class="empty-msg">Aucune intervention pr\u00e9vue aujourd\u2019hui. \ud83c\udf89</div>';
            } else {
                var html = '';
                var svcNames = { simple: 'Lavage Simple', complet: 'Lavage Complet', premium: 'Lavage Premium' };
                todayBks.forEach(function (b, i) {
                    var statusLabels = { confirmé: 'Confirmé', en_cours: 'En cours', terminé: 'Terminé', annulé: 'Annulé' };
                    html += '<div class="msg-card" style="border-left:4px solid ' +
                        (b.status === 'terminé' ? '#27ae60' : b.status === 'annulé' ? '#e74c3c' : b.status === 'en_cours' ? '#f39c12' : '#3498db') + ';margin-bottom:12px">' +
                        '<div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px">' +
                        '<div><strong>' + esc(b.name) + '</strong><br>' +
                        '<span style="font-size:.85rem;color:var(--gray)">&#9742; ' + esc(b.phone) + '</span></div>' +
                        '<span class="bk-status ' + (b.status || 'confirmé') + '">' + (statusLabels[b.status] || 'Confirmé') + '</span></div>' +
                        '<div style="margin-top:8px;font-size:.9rem">' +
                        '&#128205; ' + esc(b.address) + '<br>' +
                        '&#128663; ' + esc(b.vehicle) + ' &middot; ' + (svcNames[b.service] || b.service) + '<br>' +
                        '&#128197; ' + b.time + ' &middot; &#128176; ' + esc(b.payment) + '</div>' +
                        '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">' +
                        '<button class="bk-status-btn" style="background:#f39c12;color:white;border:none" onclick="providerUpdateStatus(' + i + ',\'confirmé\',this)">&#128073; Confirmé</button>' +
                        '<button class="bk-status-btn" style="background:#e67e22;color:white;border:none" onclick="providerUpdateStatus(' + i + ',\'en_cours\',this)">&#128668; En cours</button>' +
                        '<button class="bk-status-btn" style="background:#27ae60;color:white;border:none" onclick="providerUpdateStatus(' + i + ',\'terminé\',this)">&#10003; Terminé</button>' +
                        '<button class="bk-status-btn" style="background:#e74c3c;color:white;border:none" onclick="providerUpdateStatus(' + i + ',\'annulé\',this)">&#10060; Annulé</button></div></div>';
                });
                list.innerHTML = html;
            }

            /* Provider stats */
            var totalToday = todayBks.length;
            var doneToday = todayBks.filter(function (b) { return b.status === 'terminé'; }).length;
            var cancelledToday = todayBks.filter(function (b) { return b.status === 'annulé'; }).length;
            var ongoing = todayBks.filter(function (b) { return b.status === 'en_cours'; }).length;

            document.getElementById('provider-stats').innerHTML =
                '<div class="stat-card"><div class="num">' + totalToday + '</div><div class="label">Aujourd\'hui</div></div>' +
                '<div class="stat-card"><div class="num">' + doneToday + '</div><div class="label">Terminés</div></div>' +
                '<div class="stat-card"><div class="num">' + ongoing + '</div><div class="label">En cours</div></div>' +
                '<div class="stat-card"><div class="num">' + cancelledToday + '</div><div class="label">Annulés</div></div>';
        }

        function providerUpdateStatus(idx, status, btn) {
            var bookings = JSON.parse(localStorage.getItem('ecowash_bookings') || '[]');
            var today = new Date().toISOString().split('T')[0];
            var todayBks = bookings.filter(function (b) { return b.date === today; });
            var realIdx = bookings.indexOf(todayBks[idx]);
            if (realIdx === -1) return;
            bookings[realIdx].status = status;
            localStorage.setItem('ecowash_bookings', JSON.stringify(bookings));
            renderProviderDashboard();
            if (typeof showToast === 'function') showToast('Statut mis à jour : ' + status, 'success');
        }
    </script>
</body>
</html>
